name: Seed Test Commits

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of commits to create'
        type: number
        default: 20

jobs:
  seed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Generate conventional commits
        run: |
          TYPES=("feat" "fix" "chore" "refactor" "docs" "test" "perf" "ci" "style" "build")
          SCOPES=("auth" "api" "ui" "dashboard" "player" "upload" "comments" "notifications" "search" "settings" "billing" "analytics" "editor" "sharing" "export" "webhooks" "monitoring" "storage" "cdn" "permissions")

          MESSAGES=(
            "feat(auth): add SSO support for enterprise accounts"
            "fix(player): resolve buffering issue on slow connections"
            "feat(upload): support drag-and-drop for bulk file uploads"
            "fix(api): handle rate limiting gracefully with retry logic"
            "refactor(dashboard): migrate widget layout to CSS grid"
            "feat(comments): add threaded replies to review comments"
            "fix(notifications): deduplicate email alerts for same event"
            "chore(deps): bump axios from 1.6.2 to 1.7.0"
            "perf(search): add index on project_name for faster lookups"
            "feat(editor): implement frame-accurate trimming tool"
            "fix(sharing): enforce link expiry on password-protected shares"
            "docs(api): update OpenAPI spec for v2 review endpoints"
            "test(upload): add integration tests for chunked upload flow"
            "feat(analytics): add export-to-CSV for usage reports"
            "fix(ui): correct z-index stacking on modal overlays"
            "refactor(permissions): simplify role inheritance resolution"
            "feat(webhooks): allow filtering webhook events by project"
            "fix(billing): prorate subscription changes mid-cycle"
            "ci: add parallel test sharding to CI pipeline"
            "feat(player): add support for HDR10 playback"
            "fix(storage): prevent orphaned assets after failed transcode"
            "chore: migrate eslint config to flat config format"
            "feat(notifications): add in-app notification center"
            "fix(editor): prevent timeline desync on rapid scrubbing"
            "perf(cdn): enable brotli compression for static assets"
            "feat(sharing): add watermarked review links"
            "fix(auth): refresh token rotation not respecting TTL"
            "refactor(api): extract pagination logic into shared middleware"
            "feat(dashboard): add customizable project status columns"
            "fix(comments): timestamp links not seeking to correct frame"
            "test(auth): add E2E tests for SAML login flow"
            "feat(export): support ProRes 4444 export preset"
            "fix(search): full-text search failing on unicode characters"
            "chore(deps): update typescript from 5.3 to 5.4"
            "feat(monitoring): add real-time transcode progress indicators"
            "fix(permissions): team admin unable to revoke guest access"
            "perf(api): cache frequently accessed project metadata"
            "feat(ui): implement dark mode across all pages"
            "fix(upload): resume interrupted uploads from last checkpoint"
            "refactor(editor): decouple timeline state from component tree"
            "feat(analytics): track per-reviewer engagement metrics"
            "fix(cdn): stale cache on asset version updates"
            "docs: add architecture decision records for v2 migration"
            "feat(player): add annotation drawing tools overlay"
            "fix(billing): invoice PDF generation failing for free tier"
            "ci: add automated lighthouse performance checks"
            "feat(settings): add team-level default review settings"
            "fix(notifications): push notifications not clearing on read"
            "perf(dashboard): lazy-load project thumbnails below the fold"
            "feat(auth): add mandatory 2FA enforcement for org admins"
            "feat(api): add GraphQL subscriptions for real-time updates"
            "fix(editor): undo stack corrupted after paste operation"
            "feat(upload): add virus scanning for uploaded media files"
            "fix(dashboard): project count badge not updating on archive"
            "refactor(storage): migrate from S3 to R2 for cost reduction"
            "feat(player): add variable speed playback controls"
            "fix(auth): OAuth callback failing on Safari private browsing"
            "chore(deps): bump react from 18.2 to 18.3"
            "perf(editor): reduce timeline render cycles by 40 percent"
            "feat(comments): add emoji reactions to review comments"
            "fix(export): H.265 exports missing audio on Windows players"
            "docs(webhooks): document retry policy and failure handling"
            "test(billing): add unit tests for coupon redemption logic"
            "feat(search): add saved search filters per project"
            "fix(ui): sidebar collapse state not persisted across sessions"
            "refactor(notifications): replace polling with server-sent events"
            "feat(sharing): add granular per-clip sharing permissions"
            "fix(player): audio waveform not rendering for mono tracks"
            "ci: pin Node.js version to 20.x in all workflows"
            "feat(dashboard): add drag-and-drop project reordering"
            "fix(api): CORS preflight failing for custom domain origins"
            "perf(search): switch to trigram index for fuzzy matching"
            "feat(editor): add multi-track audio mixing interface"
            "fix(comments): mentions autocomplete showing deactivated users"
            "chore: remove deprecated jQuery dependency"
            "feat(analytics): add funnel visualization for review workflows"
            "fix(upload): progress bar stuck at 99 percent for large files"
            "refactor(auth): consolidate token validation into single module"
            "feat(monitoring): add Slack alerts for failed transcode jobs"
            "fix(permissions): custom role creation not saving restrictions"
            "test(api): add contract tests for partner integration endpoints"
            "feat(player): implement chapter markers on timeline"
            "fix(settings): timezone selector showing duplicates"
            "perf(dashboard): debounce search input to reduce API calls"
            "feat(export): add batch export with zip download"
            "fix(cdn): signed URL expiry too short for long-form content"
            "docs(permissions): add RBAC model diagram to wiki"
            "feat(ui): add keyboard shortcuts overlay panel"
            "fix(editor): snapping guides misaligned at non-standard FPS"
            "chore(deps): update eslint-plugin-react to 7.34"
            "feat(comments): add voice note comments on mobile"
            "fix(billing): Stripe webhook signature verification failing"
            "refactor(dashboard): extract project card into standalone component"
            "feat(auth): add passkey/WebAuthn support for passwordless login"
            "fix(notifications): daily digest emails sent at wrong timezone"
            "perf(api): add response compression for JSON payloads over 1KB"
            "feat(sharing): generate QR codes for review links"
            "fix(upload): duplicate file detection failing for renamed files"
            "ci: add dependency license audit to PR checks"
            "feat(editor): add color grading LUT preview panel"
            "fix(search): empty results when query contains special chars"
            "test(sharing): add snapshot tests for link generation"
            "feat(analytics): add heatmap for viewer engagement per frame"
            "fix(player): subtitles overlapping timecode display"
            "refactor(storage): implement content-addressable asset storage"
            "feat(dashboard): add recent activity feed widget"
            "fix(auth): session not invalidated after password change"
            "chore: configure renovate for automated dependency updates"
            "perf(upload): parallelize chunk uploads with 4 concurrent streams"
            "feat(webhooks): add HMAC signature verification for payloads"
            "fix(ui): dropdown menus clipped inside scrollable containers"
            "feat(monitoring): add P95 latency tracking per endpoint"
            "fix(editor): copy-paste between projects losing metadata"
            "docs(auth): add sequence diagram for OAuth2 PKCE flow"
            "feat(comments): add drawing annotations on video frames"
            "fix(api): 500 error on deeply nested folder traversal"
            "refactor(player): replace custom video element with Shaka Player"
            "feat(settings): add custom branding for workspace login page"
            "fix(billing): annual plan discount not applied at checkout"
            "perf(cdn): implement adaptive bitrate switching for previews"
            "feat(upload): add FTP and S3 ingest for enterprise workflows"
            "fix(notifications): action buttons in email not deep-linking"
            "test(editor): add visual regression tests for timeline"
            "feat(export): add custom watermark positioning and opacity"
            "fix(dashboard): archived projects appearing in global search"
            "ci: add SAST scanning with CodeQL on PR merge"
            "feat(player): add side-by-side comparison view for versions"
            "fix(sharing): guest users unable to download approved assets"
            "chore(deps): bump next from 14.1 to 14.2"
            "refactor(api): migrate REST endpoints to versioned route groups"
            "feat(analytics): add team productivity dashboard"
            "fix(storage): thumbnail generation OOM on 8K source files"
            "perf(editor): virtualize layer list for projects with 100+ tracks"
            "feat(auth): add IP allowlist for enterprise account access"
            "fix(comments): notification badge count drifting from actual"
            "feat(ui): add resizable panel layout for review workspace"
            "fix(upload): metadata extraction failing for MXF containers"
            "docs: add runbook for incident response procedures"
            "feat(player): add A/B loop for reviewing specific sections"
            "fix(permissions): folder-level permissions not cascading to children"
            "test(notifications): add load test for push notification service"
            "feat(search): add natural language search powered by embeddings"
            "fix(editor): marker export to EDL off by one frame"
            "refactor(billing): extract payment provider into adapter pattern"
            "feat(dashboard): add bulk actions toolbar for project list"
            "fix(api): pagination cursor breaking on projects with same timestamp"
            "perf(storage): implement delta sync for incremental backups"
            "feat(sharing): add expiring download tokens for approved assets"
            "fix(auth): LDAP group sync removing manually assigned roles"
            "chore: add pre-commit hook for conventional commit linting"
            "feat(monitoring): add custom alert rules builder"
            "fix(ui): focus trap not working in nested dialog modals"
            "ci: migrate from CircleCI to GitHub Actions"
            "feat(editor): add AI-powered auto-transcription panel"
            "fix(export): frame blending artifacts on speed-ramped clips"
            "perf(api): batch database queries for project listing endpoint"
            "feat(comments): add comment status workflow (open/resolved)"
            "fix(cdn): cache invalidation race condition on rapid publishes"
            "docs(api): add rate limiting section to developer guide"
            "feat(upload): add background upload queue with retry"
            "fix(player): picture-in-picture not available on Firefox"
            "refactor(search): replace Elasticsearch with Meilisearch"
            "feat(analytics): add automated weekly report email"
            "fix(billing): tax calculation incorrect for EU VAT"
            "test(api): add fuzz testing for file upload endpoint"
            "feat(settings): add SSO domain verification flow"
            "fix(editor): audio drift after 30 min in long-form timeline"
            "perf(dashboard): preload project data on hover for instant nav"
            "feat(sharing): add presentation mode for client review sessions"
            "fix(notifications): webhook delivery stuck in retry loop"
            "chore(deps): update vitest from 1.3 to 1.6"
            "feat(player): add gesture controls for touch devices"
            "fix(storage): multipart upload ETag mismatch on retry"
            "refactor(ui): replace styled-components with CSS modules"
            "feat(auth): add device management and remote session logout"
            "fix(comments): rich text editor losing formatting on save"
            "ci: add canary deployment step before full rollout"
            "feat(export): add direct-to-cloud export for Dropbox and Drive"
            "fix(api): webhook delivery timeout too aggressive at 5s"
            "perf(editor): offload waveform generation to web worker"
            "feat(dashboard): add project templates with preset settings"
            "fix(permissions): inherited deny overriding explicit allow"
            "docs(sharing): add guide for external reviewer onboarding"
            "feat(monitoring): add distributed tracing with OpenTelemetry"
            "fix(upload): filename sanitization stripping unicode characters"
            "test(permissions): add matrix tests for all role combinations"
            "feat(ui): add command palette for keyboard-driven navigation"
            "fix(billing): proration credit not appearing on next invoice"
            "refactor(notifications): split notification service into microservice"
            "feat(player): add audio-only mode for podcast reviews"
            "fix(search): relevance ranking ignoring recency signal"
            "perf(cdn): reduce TTFB with edge-side includes for player page"
            "feat(editor): add auto-save with conflict resolution"
            "fix(auth): magic link emails going to spam on Outlook"
            "chore: enable strict TypeScript mode across workspace"
            "feat(analytics): add real-time concurrent viewer count"
            "fix(dashboard): timezone conversion wrong for daylight saving"
            "ci: add visual regression testing with Chromatic"
            "feat(sharing): add team review rooms with live cursors"
            "fix(export): subtitles burned in at wrong position for 4K"
            "refactor(api): replace callbacks with async/await in legacy modules"
            "feat(upload): support HEIC and AVIF image formats"
            "fix(player): closed captions toggle state not remembered"
            "perf(search): cache popular search queries for 5 minutes"
            "feat(settings): add audit log viewer for workspace admins"
            "fix(ui): table sort icons not reflecting current sort state"
            "docs(editor): add keyboard shortcut reference card"
            "feat(comments): add @channel mention for all project members"
            "fix(billing): free trial extension not resetting limits"
            "test(dashboard): add accessibility audit with axe-core"
            "feat(monitoring): add error budget tracking with SLO dashboard"
            "fix(storage): signed URL generation failing for special char paths"
            "refactor(editor): migrate state management from Redux to Zustand"
            "feat(api): add idempotency keys for mutation endpoints"
            "fix(notifications): mobile push tokens not refreshed on app update"
            "perf(upload): use streaming hash calculation to avoid buffering"
            "feat(player): add multi-angle camera switching for live events"
            "fix(sharing): broken thumbnail preview in link unfurl"
            "ci: add automatic changelog generation on release"
            "feat(dashboard): add Gantt chart view for project timelines"
            "fix(auth): rate limiter not resetting after successful login"
            "chore(deps): bump playwright from 1.42 to 1.44"
            "feat(editor): add proxy editing workflow for 8K footage"
            "fix(api): file download endpoint not setting Content-Disposition"
            "perf(dashboard): implement stale-while-revalidate caching strategy"
            "feat(export): add scheduled export jobs with email notification"
            "fix(permissions): public link access bypassing IP restrictions"
            "docs: add contributing guide with local development setup"
            "feat(search): add filter by date range and file type"
            "fix(editor): color picker not working in annotation toolbar"
            "test(upload): add chaos tests for upload service resilience"
            "refactor(cdn): implement origin shield to reduce origin load"
            "feat(auth): add SCIM provisioning for enterprise identity providers"
            "fix(ui): infinite scroll triggering extra API calls at boundary"
            "feat(analytics): add custom event tracking with tag manager"
            "fix(comments): thread collapse state lost on page navigation"
            "perf(api): implement cursor-based pagination for large datasets"
            "feat(monitoring): add automated incident timeline generation"
            "fix(billing): downgrade not cancelling add-on subscriptions"
            "chore: standardize error codes across all API endpoints"
          )

          mkdir -p seed

          COUNT=${{ inputs.count }}
          TOTAL=${#MESSAGES[@]}

          for i in $(seq 1 "$COUNT"); do
            INDEX=$(( (RANDOM + i) % TOTAL ))
            MSG="${MESSAGES[$INDEX]}"

            # Touch a unique file so the commit has actual content
            SLUG=$(echo "$MSG" | sed 's/[^a-zA-Z0-9]/-/g' | tr '[:upper:]' '[:lower:]' | cut -c1-60)
            echo "// Commit $i — $(date -u +%Y-%m-%dT%H:%M:%SZ)" > "seed/${SLUG}.txt"
            git add -A
            git commit -m "$MSG"
          done

      - name: Push commits
        run: git push origin main
