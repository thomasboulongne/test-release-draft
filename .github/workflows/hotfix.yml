name: Hotfix Release

#
# Applies one or more hotfix commits from main to a published (or draft)
# release branch, then triggers release-preview to cut a new release.
#
# Happy path: each commit is cherry-picked directly onto the hotfix branch,
# preserving the original commit message. No intermediate PRs are created.
#
# Conflict path: if a cherry-pick has conflicts, the conflicted commit is
# pushed to a staged branch and a PR is created for manual resolution.
# Remaining commits are skipped. The workflow exits with status=needs-resolution.
#

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release tag to hotfix (e.g. @frameio/next-web-app@522.0)'
        required: true
        type: string
      commits:
        description: 'Comma-separated commit SHAs from main to cherry-pick'
        required: true
        type: string
      skip-release-preview:
        description: 'Skip triggering release-preview after hotfix'
        type: boolean
        default: false
      dry-run:
        description: 'Validate inputs without making changes'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: hotfix-${{ github.event.inputs.release-tag }}
  cancel-in-progress: false

jobs:
  hotfix:
    name: Apply Hotfix
    runs-on: ubuntu-latest
    outputs:
      hotfix_branch: ${{ steps.hotfix.outputs.hotfix_branch }}
      status: ${{ steps.hotfix.outputs.status }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.ORG_GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Run Hotfix
        id: hotfix
        run: |
          npx tsx scripts/hotfix/hotfix.ts \
            --release-tag "${{ github.event.inputs.release-tag }}" \
            --commits "${{ github.event.inputs.commits }}" \
            ${{ github.event.inputs.skip-release-preview == 'true' && '--skip-release-preview' || '' }} \
            ${{ github.event.inputs.dry-run == 'true' && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
